<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mode hors-ligne - Yahya Haroun</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #09090f;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { color: #8b5cf6; }
        p { color: #94a3b8; max-width: 400px; line-height: 1.5; }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
        button {
            margin-top: 2rem;
            background-color: #7c3aed;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background-color: #6d28d9; }
    </style>
</head>
<body>
    <div class="icon">📶❌</div>
    <h1>Vous êtes hors-ligne</h1>
    <p>Il semblerait que votre connexion internet soit coupée. L'application a besoin d'une connexion pour charger les nouvelles données.</p>
    <button onclick="window.location.reload()">Réessayer</button>
</body>
</html>
